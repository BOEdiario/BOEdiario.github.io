baseURL = "https://boediario.github.io/"
languageCode = "es"
timeZone = "Europe/Madrid"
title = "BOEdiario"
theme = "broadsheet"

[module]
  [[module.mounts]]
    source = "archetypes"
    target = "archetypes"

  [[module.mounts]]
    source = "assets"
    target = "assets"

  [[module.mounts]]
    source = "content"
    target = "content"

  [[module.mounts]]
    source = "data"
    target = "data"

  [[module.mounts]]
    source = "i18n"
    target = "i18n"

  [[module.mounts]]
    source = "layouts"
    target = "layouts"

  [[module.mounts]]
    source = "static"
    target = "static"

  # repo content (checked out by GitHub Actions into _external/content)
  [[module.mounts]]
    source = "_external/content/content/noticias"
    target = "content/noticias"

  # edición diaria → data/ediciones/YYYY-MM-DD.json
  [[module.mounts]]
    source = "_external/content/data"
    target = "data"

  # assets de imagen generados por el pipeline
  [[module.mounts]]
    source = "_external/content/static/media"
    target = "static/media"

[params]
  tagline = "Las leyes del BOE, como si fueran un periódico"
  showReadingTime = true
  enableSearch = false
  enableShareButtons = true

  [[params.footerLinks]]
    name = "About"
    url = "/about/"

  [[params.footerLinks]]
    name = "Contact"
    url = "/contact/"

  [[params.footerLinks]]
    name = "Search"
    url = "/search/"

[menu]
  [[menu.main]]
    name = "News"
    url = "/noticias/"
    weight = 1
    
  [[menu.main]]
    name = "News"
    url = "/noticias/"
    weight = 1

  [[menu.main]]
    name = "Search"
    url = "/search/"
    weight = 2

# ── llms.txt output format ────────────────────────────────────────────────────

[mediaTypes]
  [mediaTypes."text/plain"]
    suffixes = ["txt"]

[outputFormats]
  [outputFormats.LLMSTxt]
    mediaType      = "text/plain"
    baseName       = "llms"
    isPlainText    = true
    notAlternative = true

[outputs]
  home = ["HTML", "RSS", "LLMSTxt"]
