baseURL = "https://boediario.github.io/"
languageCode = "es"
defaultContentLanguage = "es"
timeZone = "Europe/Madrid"
title = "BOEdiario"
theme = "broadsheet"

[module]
  [[module.mounts]]
    source = "archetypes"
    target = "archetypes"

  [[module.mounts]]
    source = "assets"
    target = "assets"

  [[module.mounts]]
    source = "content"
    target = "content"

  [[module.mounts]]
    source = "data"
    target = "data"

  [[module.mounts]]
    source = "i18n"
    target = "i18n"

  [[module.mounts]]
    source = "layouts"
    target = "layouts"

  [[module.mounts]]
    source = "static"
    target = "static"

  # repo content (checked out by GitHub Actions into _external/content)
  [[module.mounts]]
    source = "_external/content/content/noticias"
    target = "content/noticias"

  # edición diaria → data/ediciones/YYYY-MM-DD.json
  [[module.mounts]]
    source = "_external/content/data"
    target = "data"

  # assets de imagen generados por el pipeline
  [[module.mounts]]
    source = "_external/content/static/media"
    target = "static/media"

[params]
  tagline = "Las leyes del BOE, explicadas"
  showReadingTime = true
  enableSearch = false
  enableShareButtons = true

  [[params.footerLinks]]
    name = "Acerca de"
    url = "/about/"

  [[params.footerLinks]]
    name = "Contacto"
    url = "/contact/"

  [[params.footerLinks]]
    name = "Buscar"
    url = "/search/"

[taxonomies]
  seccion = "secciones"
  tag = "tags"

[menu]
  [[menu.main]]
    identifier = "coste-de-vida"
    name       = "Coste de vida"
    url        = "/secciones/coste-de-vida/"
    weight     = 10

  [[menu.main]]
    identifier = "vivienda"
    name       = "Vivienda"
    url        = "/secciones/vivienda/"
    weight     = 20

  [[menu.main]]
    identifier = "salud"
    name       = "Salud"
    url        = "/secciones/salud/"
    weight     = 30

  [[menu.main]]
    identifier = "educacion"
    name       = "Educación"
    url        = "/secciones/educacion/"
    weight     = 40

  [[menu.main]]
    identifier = "movilidad"
    name       = "Movilidad"
    url        = "/secciones/movilidad/"
    weight     = 50

  [[menu.main]]
    identifier = "entorno"
    name       = "Medio Ambiente"
    url        = "/secciones/entorno/"
    weight     = 60

  [[menu.main]]
    identifier = "sociedad"
    name       = "Sociedad"
    url        = "/secciones/sociedad/"
    weight     = 70

  [[menu.main]]
    identifier = "search"
    name       = "BUSCAR"
    url        = "/search"
    weight     = 80

# ── llms.txt output format ────────────────────────────────────────────────────

[mediaTypes]
  [mediaTypes."text/plain"]
    suffixes = ["txt"]

[outputFormats]
  [outputFormats.LLMSTxt]
    mediaType      = "text/plain"
    baseName       = "llms"
    isPlainText    = true
    notAlternative = true

[outputs]
  home = ["HTML", "RSS", "LLMSTxt"]
