name: BOEdiario — Build y Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      date:
        description: "Fecha de la edición a publicar (YYYY-MM-DD). Solo informativo."
        required: false
        default: ""

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build Hugo
    runs-on: ubuntu-latest

    env:
      HUGO_VERSION: 0.159.1

    steps:
      - name: Checkout sitio público
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Checkout repo de contenido (sparse)
        uses: actions/checkout@v4
        with:
          repository: BOEdiario/content
          token: ${{ secrets.BOEDIARIO_CONTENT_REPO_PAT }}
          path: _external/content
          sparse-checkout: |
            content/noticias
            data/ediciones
            static/media

      - name: Verificar que hay contenido publicable
        run: |
          if [ ! -d "_external/content/content/noticias" ]; then
            echo "::warning::No se encontró content/noticias en el repo de contenido"
          fi
          if [ ! -d "_external/content/data/ediciones" ]; then
            echo "::warning::No se encontró data/ediciones en el repo de contenido"
          fi

          # Si se indicó una fecha, verificar que existe su edition.json
          DATE="${{ github.event.inputs.date }}"
          if [ -n "$DATE" ]; then
            EDITION="_external/content/data/ediciones/${DATE}.json"
            if [ -f "$EDITION" ]; then
              echo "✅ edition.json encontrado: $EDITION"
            else
              echo "::warning::edition.json no encontrado para $DATE — Hugo usará el contenido disponible"
            fi
          fi

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Setup Node.js (Pagefind)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Hugo Extended
        run: |
          wget -O "${{ runner.temp }}/hugo.deb" \
            "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb"
          sudo dpkg -i "${{ runner.temp }}/hugo.deb"
          hugo version

      - name: Install Dart Sass
        run: sudo snap install dart-sass

      - name: Build con Hugo
        env:
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
          HUGO_ENVIRONMENT: production
        run: |
          hugo \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/"

      - name: Verificar build mínimo
        run: |
          if [ ! -d "public" ] || [ -z "$(ls -A public)" ]; then
            echo "::error::El build de Hugo no generó contenido en public/"
            exit 1
          fi
          echo "✅ Build OK — $(find public -name '*.html' | wc -l | tr -d ' ') páginas HTML generadas"

      - name: Build índice Pagefind
        run: npx -y pagefind --site public

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    name: Deploy a GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
